<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR体験 — QRコード</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      text-align: center;
      padding: 40px 48px;
      border-radius: 24px;
      border: 2px solid #e0e0e0;
      max-width: 360px;
      width: 90vw;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }
    .qr {
      width: 200px;
      height: 200px;
      border-radius: 12px;
      border: 1px solid #eee;
      display: block;
      margin: 0 auto 24px;
    }
    .step {
      font-size: 13px;
      color: #555;
      line-height: 2;
      margin-bottom: 20px;
    }
    .step span {
      display: inline-block;
      background: #0288d1;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      line-height: 20px;
      text-align: center;
      margin-right: 6px;
    }
    .url {
      font-size: 11px;
      color: #aaa;
      word-break: break-all;
      margin-top: 8px;
    }
    @media print {
      body { background: #fff; }
      .card { border: 1.5px solid #ccc; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">⭐ Web AR 体験</div>
    <div class="subtitle">QR コードを読み取ってください</div>

    <img src="qr.png" alt="QR Code" class="qr" />

    <div class="step">
      <span>1</span>カメラでQRを読み取る<br>
      <span>2</span>「Start AR」を押す<br>
      <span>3</span>★マーカーにカメラを向ける
    </div>

    <div class="url">https://koooohei122.github.io/ar-creator-reader/</div>
  </div>
</body>
</html>
