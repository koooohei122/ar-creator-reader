<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Test</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }
    #container { position:fixed; inset:0; }
    #log {
      position:fixed; top:0; left:0; right:0; z-index:9999;
      background:rgba(0,0,0,0.88); color:#0ff;
      padding:12px; font:bold 13px/1.7 monospace;
      white-space:pre-wrap; word-break:break-all;
    }
    #log.ok  { background:rgba(0,160,60,0.95); color:#fff; font-size:20px; }
    #log.err { background:rgba(180,0,0,0.95); color:#fff; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="log">⏳ Loading modules from CDN...</div>

  <script type="module">
    // esm.sh が "three" bare import を自動解決 → importmap 不要
    import { MindARThree } from 'https://esm.sh/mind-ar@1.2.5/dist/mindar-image-three.prod.js?deps=three@0.151.0'
    import * as THREE from 'https://esm.sh/three@0.151.0'

    const logEl = document.getElementById('log')
    const lines = []
    function log(msg, cls) {
      const t = new Date().toISOString().slice(11,19)
      lines.push('[' + t + '] ' + msg)
      logEl.textContent = lines.slice(-10).join('\n')
      if (cls) logEl.className = cls
    }

    log('modules loaded OK')

    try {
      const mindarThree = new MindARThree({
        container: document.getElementById('container'),
        imageTargetSrc: './targets/marker.mind',
        maxTrack: 1,
        warmupTolerance: 1,
        missTolerance: 5,
        uiLoading: 'no',
        uiScanning: 'no',
        uiError: 'no',
      })

      const { renderer, scene, camera } = mindarThree
      scene.add(new THREE.AmbientLight(0xffffff, 1))

      const anchor = mindarThree.addAnchor(0)
      anchor.group.add(new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff2200 })
      ))

      anchor.onTargetFound = () => log('★★★ MARKER DETECTED ★★★', 'ok')
      anchor.onTargetLost  = () => { logEl.className = ''; log('lost — searching...') }

      log('starting camera...')
      await mindarThree.start()
      log('camera OK — point at blue card')

      renderer.setAnimationLoop(() => renderer.render(scene, camera))

    } catch (err) {
      log('ERROR: ' + err.message, 'err')
    }
  </script>
</body>
</html>
